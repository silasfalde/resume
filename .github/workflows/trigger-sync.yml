name: Trigger Website Sync

on:
  push:
    branches: [main]
    paths:
      - 'resume.pdf'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync in website repo
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            https://api.github.com/repos/silasfalde/silasfalde.github.io/dispatches \
            -d '{"event_type":"resume-updated"}'
